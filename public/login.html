<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Piler Archive Extractor Login</title>
  <style>
    :root {
      --bg: #0b0f17;
      --surface: #111827;
      --surface-elevated: #172033;
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #4f7cff;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background: linear-gradient(180deg, #0b0f17 0%, #0d1320 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(430px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.9);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      padding: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.15;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 650;
    }

    input {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      background: rgba(11, 15, 23, 0.76);
      padding: 0 12px;
      font: inherit;
    }

    input:focus {
      outline: 2px solid rgba(79, 124, 255, 0.9);
      outline-offset: 2px;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: 12px;
      color: #fff;
      background: var(--primary);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(79, 124, 255, 0.26);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .error {
      display: none;
      border: 1px solid rgba(239, 68, 68, 0.28);
      border-radius: 12px;
      padding: 10px 12px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.1);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div class="brand-mark">P</div>
      <div>
        <h1>Piler Archive Extractor</h1>
        <p>Admin access for contact preparation workspace.</p>
      </div>
    </div>

    <form id="loginForm" method="post" action="/auth/login">
      <input type="hidden" id="csrfToken" name="csrf_token" value="{{csrf_token}}" />
      <label>
        Email
        <input id="email" name="email" type="email" autocomplete="username" required />
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>
      <div class="error" id="errorBox" role="alert"></div>
      <button id="loginButton" type="submit">Log in</button>
    </form>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const button = document.getElementById("loginButton");
    const errorBox = document.getElementById("errorBox");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.classList.remove("visible");
      button.disabled = true;

      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Accept": "application/json",
            "Content-Type": "application/json",
            "X-CSRF-Token": document.getElementById("csrfToken").value,
          },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
            csrf_token: document.getElementById("csrfToken").value,
          }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error?.message || "Login failed.");
        }

        window.location.href = "/gui";
      } catch (error) {
        errorBox.textContent = error.message || "Login failed.";
        errorBox.classList.add("visible");
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
